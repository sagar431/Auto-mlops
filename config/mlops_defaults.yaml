# MLOps Default Configuration
# These are applied when creating new ML projects

hydra:
  config_dir: "configs"
  config_name: "config"
  default_structure:
    - model
    - data
    - training
    - paths

mlflow:
  tracking_uri: "mlruns"
  experiment_prefix: "exp"
  log_artifacts: true

dvc:
  init_git: false  # Assume git already initialized
  remote_name: "storage"
  cache_dir: ".dvc/cache"

docker:
  python_version: "3.10"
  base_images:
    cpu: "python:3.10-slim"
    gpu: "pytorch/pytorch:2.0.0-cuda11.7-cudnn8-runtime"

github_actions:
  workflow_name: "ML Pipeline"
  trigger_on:
    - push
    - workflow_dispatch
  python_version: "3.10"

training:
  seed: 42
  default_epochs: 10
  default_batch_size: 32
  default_lr: 0.001
