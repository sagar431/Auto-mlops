name: Golden Slice Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: golden-slice-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Phase 0 and golden slice
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check lockfile
        run: uv lock --check

      - name: Install locked dependencies
        run: uv sync --extra dev --locked

      - name: Lint
        run: uv run ruff check .

      - name: Test workflow registry
        run: uv run pytest tests/unit/test_workflow_registry.py

      - name: Test agent loop
        run: uv run pytest tests/unit/test_agent_loop.py

      - name: Test step execution
        run: uv run pytest tests/unit/test_execute_step.py

      - name: Test end-to-end workflows
        run: uv run pytest tests/e2e

      - name: Test image-classification example
        run: uv run pytest examples/image_classification/tests -q

      - name: Verify golden slice locally
        run: uv run python examples/image_classification/verify_golden.py

  docker:
    name: Golden slice Docker smoke test
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked dependencies
        run: uv sync --extra dev --locked

      - name: Build and verify local Docker image
        run: uv run python examples/image_classification/verify_golden.py --docker
