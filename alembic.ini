# Alembic Configuration for MLOps Agent
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# path to migration scripts
script_location = db/migrations

# template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# sys.path prepends
prepend_sys_path = .

# timezone for file timestamps (defaults to local timezone)
# timezone =

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command
revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a source .py file
sourceless = false

# version path separator
version_path_separator = os  # Use os.pathsep

# set to 'true' to search source files recursively
recursive_version_locations = false

# the output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# Database URL - overridden by env.py from DATABASE_URL environment variable
sqlalchemy.url = sqlite:///./mlops_agent.db

[post_write_hooks]
# Formatting hooks for generated migration files
hooks = black, ruff

black.type = console_scripts
black.entrypoint = black
black.options = --line-length 100 REVISION_SCRIPT_FILENAME

ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
