# Synthetic Dataset Configuration
# For testing without downloading real data

dataset: synthetic
data_dir: ${hydra:runtime.cwd}/data
vocab_size: 1000
max_length: 128
num_workers: 2
use_synthetic: true

# HuggingFace options (disabled for synthetic)
use_huggingface: false
tokenizer_name: bert-base-uncased
max_samples: null
