stages:
  prepare_golden_data:
    cmd: >-
      uv run python golden_data.py
      --output-dir data/golden
      --seed ${prepare.seed}
      --train-samples ${prepare.train_samples}
      --validation-samples ${prepare.validation_samples}
    deps:
      - golden_data.py
    params:
      - prepare.seed
      - prepare.train_samples
      - prepare.validation_samples
    outs:
      - data/golden

  train_golden:
    cmd: >-
      uv run python golden_train.py
      --dataset-dir data/golden
      --manifest data/golden/manifest.json
      --output-dir artifacts/dvc-golden
      --seed ${train.seed}
      --epochs ${train.epochs}
      --train-samples ${prepare.train_samples}
      --validation-samples ${prepare.validation_samples}
      --batch-size ${train.batch_size}
      --learning-rate ${train.learning_rate}
      --mlflow-storage-dir .mlflow
    deps:
      - data/golden
      - golden_data.py
      - golden_train.py
      - golden_mlflow.py
      - model.py
    params:
      - prepare.train_samples
      - prepare.validation_samples
      - train.seed
      - train.epochs
      - train.batch_size
      - train.learning_rate
    outs:
      - artifacts/dvc-golden/model.pt
      - artifacts/dvc-golden/training_config.json
      - artifacts/dvc-golden/lineage.json
      - artifacts/dvc-golden/sample-red.png
    metrics:
      - artifacts/dvc-golden/metrics.json:
          cache: false
