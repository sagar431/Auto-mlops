# Hydra Configuration for CIFAR-10 Image Classification
# Uses modular config groups: model, training, data, paths

defaults:
  - model: cifar10_cnn
  - training: default
  - data: cifar10
  - paths: default
  - _self_

# Random seed for reproducibility
seed: 42

# Hydra settings
hydra:
  run:
    dir: ${paths.output_dir}/runs/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ${paths.output_dir}/multirun/${now:%Y-%m-%d_%H-%M-%S}
