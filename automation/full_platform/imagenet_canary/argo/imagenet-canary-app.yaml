apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: imagenet-canary
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/auto-mlops.git
    targetRevision: main
    path: automation/full_platform/imagenet_canary/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: auto-mlops-canary
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
