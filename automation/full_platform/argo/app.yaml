apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auto-mlops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/auto-mlops.git
    targetRevision: main
    path: automation/full_platform/helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: auto-mlops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
