images:
  model_api: "<account>.dkr.ecr.<region>.amazonaws.com/model-api:latest"
  web_ui: "<account>.dkr.ecr.<region>.amazonaws.com/web-ui:latest"
redis:
  image: "redis:7"
service:
  model_api_port: 8000
  web_ui_port: 8080
k8s:
  namespace: "auto-mlops"
  replicas:
    model_api: 1
    web_ui: 1
  hpa:
    enabled: true
    min: 1
    max: 3
    target_cpu: 70
