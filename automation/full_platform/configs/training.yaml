model:
  framework: timm
  timm_name: "resnet18"
  hf_model: "google/vit-base-patch16-224"
  num_classes: 6
training:
  epochs: 5
  batch_size: 32
  learning_rate: 0.001
  optimizer: "adam"
  weight_decay: 0.0001
  image_size: 224
hpo:
  trials: 10
  lr_range: [1e-5, 1e-2]
  batch_sizes: [16, 32, 64]
lf:
  start_lr: 1e-6
  end_lr: 1
  num_iter: 100
